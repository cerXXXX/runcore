name: iOS Build & Auto Release

on:
  push:
    tags:
      - 'v*'  # Триггер только на теги вида v1.0.0
  # workflow_dispatch позволяет запустить вручную из UI GitHub
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
      - name: Checkout runcore
        uses: actions/checkout@v4
        with:
          path: runcore
          fetch-depth: 0  # Важно для получения тегов
      
      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Clone go-reticulum (sibling directory)
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth 1 --branch main https://github.com/svanichkin/go-reticulum.git
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Check Flutter/Dart versions
        run: |
          flutter --version
          dart --version
      
      - name: Build iOS Runcore.xcframework
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter/native/apple/Frameworks
          chmod +x build.sh
          ./build.sh ios
        env:
          CGO_ENABLED: 1
      
      - name: Fix pubspec.yaml (remove invalid config section)
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter
          sed -i '' '/^  config:$/d' pubspec.yaml
          sed -i '' '/^    enable-swift-package-manager:/d' pubspec.yaml
      
      - name: Flutter Pub Get
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter
          flutter pub get
      
      - name: iOS Pod Install
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter/ios
          pod install
      
      - name: Build Unsigned IPA
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter
          flutter build ios \
            --no-codesign \
            --release \
            --target=lib/main.dart
      
      - name: Create IPA Archive
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../runcore_unsigned.ipa Payload
          echo "ipa_path=$GITHUB_WORKSPACE/runcore/flutter/runcore_unsigned.ipa" >> $GITHUB_ENV
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 📱 Runcore iOS Build
            
            **Version:** ${{ steps.version.outputs.version }}
            **Build Date:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            
            ### ⚠️ Important
            This is an **unsigned IPA**. It cannot be installed on physical devices without signing.
            
            ### 🔧 Usage
            - For testing on simulator: Extract and run in Xcode
            - For device installation: Requires Sideloadly
            
            ### 📦 Contents
            - `runcore_unsigned.ipa` - iOS application bundle
          draft: false
          prerelease: false
          files: |
            ${{ env.ipa_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
