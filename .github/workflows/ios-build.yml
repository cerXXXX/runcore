name: iOS Build (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
      - name: Checkout runcore
        uses: actions/checkout@v4
        with:
          path: runcore
      
      - name: Clone go-reticulum (sibling directory)
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth 1 --branch main https://github.com/svanichkin/go-reticulum.git
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
          channel: 'stable'
      
      - name: Build iOS Runcore.xcframework
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter/native/apple/Frameworks
          ./build.sh ios
        env:
          CGO_ENABLED: 1
      
      - name: Flutter Pub Get
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter
          flutter pub get
      
      - name: iOS Pod Install
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter/ios
          pod install
      
      - name: Build Unsigned IPA
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter
          flutter build ios \
            --no-codesign \
            --release \
            --target=lib/main.dart
      
      - name: Create IPA Archive
        run: |
          cd $GITHUB_WORKSPACE/runcore/flutter/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../runcore_unsigned.ipa Payload
      
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: runcore-unsigned-ipa
          path: ${{ github.workspace }}/runcore/flutter/runcore_unsigned.ipa
          retention-days: 7
